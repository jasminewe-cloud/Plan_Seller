<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claim Your Home — Zillow</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
    -webkit-font-smoothing: antialiased; background: #ADB5BD; color: #343A40; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    a { color: #000000; }

    .modal { background: #ffffff; border: 1px solid #C8CDD3; border-radius: 6px; width: 100%; max-width: 520px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }

    .modal-title { font-size: 22px; font-weight: 800; color: #000000; margin-bottom: 16px; }
    .modal-body { font-size: 15px; color: #343A40; line-height: 1.6; margin-bottom: 28px; }

    /* Progress indicator */
    .progress { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; font-size: 13px; }
    .progress-step { font-weight: 700; color: #000000; }
    .progress-step.inactive { color: #ADB5BD; font-weight: 400; }
    .progress-arrow { color: #ADB5BD; }

    .btn { display: block; width: 100%; background: #212529; color: #ffffff; font-size: 15px; font-weight: 700; padding: 14px 20px; border-radius: 4px; text-decoration: none; text-align: center; border: none; cursor: pointer; font-family: inherit; margin-bottom: 14px; }
    .btn:hover { background: #343A40; }

    .link-secondary { display: block; text-align: center; font-size: 14px; color: #ADB5BD; text-decoration: none; }
    .link-secondary:hover { color: #343A40; text-decoration: underline; }

    .modal-address { font-size: 13px; color: #ADB5BD; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

    /* ── CONSTELLATION OVERRIDES ── */
    /* Object Sans on brand text */
    .global-nav-wordmark,
    .price-large, .value-card-amount, .market-index-score,
    .equity-item strong, .section-heading, .hero-headline,
    h1, h2, h3 {
      font-family: "Object Sans", "Inter", sans-serif !important;
      letter-spacing: -0.01em;
    }
    /* Inter on everything else */
    body, input, button, select, textarea {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    /* Pill buttons */
    .btn, .btn-black, .btn-sm, .sidebar-cta-btn, .msg-cta,
    .btn-outline-sm, .search-btn {
      border-radius: 999px !important;
      font-family: "Inter", sans-serif;
      font-weight: 600;
    }
    /* Pill Voyager chips */
    .suggested-q {
      border-radius: 999px !important;
    }
    /* Rounded-rect icon glyph (not circle) */
    .icon-glyph {
      border-radius: 8px !important;
      width: 32px !important;
      height: 32px !important;
    }
    /* Voyager mode badge as pill */
    .voyager-panel-mode {
      border: 1px solid #C8CDD3;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6C757D;
    }
    /* Voyager title — Object Sans */
    .voyager-panel-title {
      font-family: "Object Sans", "Inter", sans-serif;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: -0.01em;
      color: #000;
    }
    /* AI module head */
    .ai-blurb-label, .ai-module-head {
      font-family: "Object Sans", "Inter", sans-serif;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: -0.01em;
    }
    /* Intent chips — pill */
    .intent-chip {
      border-radius: 999px !important;
    }
    /* Avatar — pill */
    .global-nav-avatar {
      border-radius: 999px !important;
    }
    /* Sidebar floating card treatment */
    .sidebar {
      border-left: none !important;
      margin: 16px 16px 16px 0;
      border: 1px solid #C8CDD3 !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 28px rgba(17,17,22,0.10) !important;
      overflow: hidden;
    }
    /* Modal inner — rounded card with gap from viewport edges */
    .page-body-wrapper {
      padding: 16px !important;
      gap: 16px !important;
    }
    .modal-drawer-inner {
      border-radius: 8px !important;
      border: 1px solid #C8CDD3 !important;
      box-shadow: 0 8px 28px rgba(17,17,22,0.10) !important;
    }
  </style>
</head>
<body>

  <div class="modal">
    <div class="modal-address">4821 Maple Ave, Seattle, WA 98103</div>
    <h1 class="modal-title">Claim 4821 Maple Ave</h1>

    <!-- Progress indicator -->
    <div class="progress">
      <span class="progress-step">Step 1 of 2 &mdash; Claim</span>
      <span class="progress-arrow">&rarr;</span>
      <span class="progress-step inactive">Step 2 &mdash; Verify ownership</span>
    </div>

    <p class="modal-body">Claiming this home lets you edit your home's details, see homeowner-only insights, and track your home's value over time.</p>

    <a href="verify-modal.html" class="btn">Continue to verify ownership</a>
    <a href="nfshdp-preclaim.html" class="link-secondary">Cancel</a>
  </div>

</body>
</html>
